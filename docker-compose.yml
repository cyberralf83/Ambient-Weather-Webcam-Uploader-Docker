services:
  ams-cam-upload:
    build: .
    image: ams-cam-upload
    container_name: ams-cam-upload
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    environment:
      # Required settings
      - "INPUT_IP_ADDRESS=${INPUT_IP}"
      - "SERVER=${SERVER:-ftp2.ambientweather.net}"
      - "PORT=${PORT:-21}"
      - "USERNAME=${USERNAME}"
      - "PASSWORD=${PASSWORD}"

      # Optional settings with defaults
      - "CRON_SCHEDULE=${CRON_SCHEDULE:-*/2 * * * *}"  # Default: every 2 minutes
      - "MAX_RETRIES=${MAX_RETRIES:-3}"                # Default: 3 retry attempts
      - "RETRY_DELAY=${RETRY_DELAY:-5}"                # Default: 5 seconds between retries
      - "TIMEOUT=${TIMEOUT:-30}"                       # Default: 30 second timeout
      - "MIN_IMAGE_SIZE=${MIN_IMAGE_SIZE:-1024}"       # Default: 1KB minimum image size
      - "KEEP_IMAGES=${KEEP_IMAGES:-5}"                # Default: keep last 5 images
      - "HEALTHCHECK_MAX_AGE=${HEALTHCHECK_MAX_AGE:-300}"  # Default: 5 minutes
      - "TZ=${TZ:-UTC}"                                # Default: UTC timezone

      # Image processing (optional, disabled if unset)
      - "IMAGE_RESIZE=${IMAGE_RESIZE:-}"               # Max dimensions, e.g., 1920x1080
      - "IMAGE_QUALITY=${IMAGE_QUALITY:-}"              # JPEG quality 1-100, e.g., 85

      # Status web page (busybox httpd) — set STATUS_ENABLED=false to disable
      - "STATUS_ENABLED=${STATUS_ENABLED:-true}"
      - "STATUS_PORT=${STATUS_PORT:-8080}"

    ports:
      # Status page port. Always published — if STATUS_ENABLED=false, comment
      # this line out as well, otherwise the port is open on the host with
      # nothing listening inside the container.
      - "${STATUS_PORT:-8080}:${STATUS_PORT:-8080}"

    volumes:
      # Persist archived images (optional)
      - "./data/archive:/home/root/archive"
      # Persist logs (optional)
      - "./data/logs:/var/log"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
